name: AI-DLC

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-flight runs for the same PR on force-push.
concurrency:
  group: aidlc-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── 1. Traceability gate ───────────────────────────────────────────────────
  # Fast check: fails immediately if production source changed without a spec
  # reference. Runs in parallel with the build so feedback is instant.
  traceability-gate:
    name: Traceability Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --quiet

      - name: Check spec traceability
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/check_traceability.sh

  # ── 2. Build & verify ─────────────────────────────────────────────────────
  # Detects which OrderFlow services changed and runs mvn verify for each.
  # Only services with changed source are built to keep CI fast.
  build-and-verify:
    name: Build & Verify
    runs-on: ubuntu-latest
    outputs:
      changed-services: ${{ steps.detect.outputs.services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --quiet

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Detect changed services
        id: detect
        run: |
          services=""
          for svc in order-service pricing-service fulfilment-service invoice-service notification-service; do
            if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -q "^${svc}/src/"; then
              services="${services} ${svc}"
            fi
          done
          services="${services# }"  # trim leading space
          echo "services=${services}" >> "$GITHUB_OUTPUT"
          if [[ -z "$services" ]]; then
            echo "No service source changes detected."
          else
            echo "Changed services: ${services}"
          fi

      - name: mvn verify — changed services
        if: steps.detect.outputs.services != ''
        run: |
          failed=""
          for svc in ${{ steps.detect.outputs.services }}; do
            echo "::group::mvn verify ${svc}"
            if ! mvn -f "${svc}/pom.xml" verify \
                --batch-mode \
                --no-transfer-progress \
                -Dsurefire.failIfNoSpecifiedTests=false; then
              failed="${failed} ${svc}"
            fi
            echo "::endgroup::"
          done
          if [[ -n "$failed" ]]; then
            echo "::error::mvn verify failed for:${failed}"
            exit 1
          fi

      - name: No service source changed — skip build
        if: steps.detect.outputs.services == ''
        run: echo "No service source changes — mvn verify skipped."

  # ── 3. AI review gate ─────────────────────────────────────────────────────
  # Invokes the review-agent via the Anthropic API and posts a structured
  # findings report as a PR comment. Fails the job if blockers are present.
  # Humans still give final PR approval — nothing auto-merges.
  review-gate:
    name: AI Review Gate
    runs-on: ubuntu-latest
    needs: build-and-verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --quiet

      - name: Run review-agent pre-vet
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/run_review_agent.sh
